<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini-P7 — Sign in</title>
<style>
  :root {
    --bg:#f7f7f4; --panel:#fff; --ink:#1f1f1d; --muted:#6b6a64;
    --line:#e4e3dd; --accent:#185fa5; --crit:#c0392b; --crit-soft:#fcebeb;
  }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:var(--bg); color:var(--ink); }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:14px;
          padding:30px 32px; width:360px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  h1 { font-size:20px; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:20px; }
  label { display:block; font-size:12px; color:var(--muted); margin:12px 0 4px; }
  input { width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px;
          font:inherit; font-size:14px; }
  input:focus { outline:none; border-color:var(--accent); }
  button { width:100%; margin-top:18px; padding:10px; border:none; border-radius:8px;
           background:var(--accent); color:#fff; font:inherit; font-size:14px; cursor:pointer; }
  button:hover { opacity:.93; }
  .toggle { text-align:center; margin-top:16px; font-size:13px; color:var(--muted); }
  .toggle a { color:var(--accent); cursor:pointer; text-decoration:none; }
  .err { background:var(--crit-soft); color:var(--crit); padding:9px 12px; border-radius:8px;
         font-size:13px; margin-top:14px; display:none; }
  .orgrow { display:none; }
</style>
</head>
<body>
<div class="card">
  <h1 id="title">Welcome back</h1>
  <div class="sub" id="subtitle">Sign in to your Mini-P7 workspace.</div>

  <div id="name-row" class="orgrow">
    <label>Your name</label>
    <input id="name" type="text" placeholder="Jane Founder" />
  </div>
  <label>Email</label>
  <input id="email" type="email" placeholder="you@company.com" />
  <label>Password</label>
  <input id="password" type="password" placeholder="••••••••" />
  <div id="org-row" class="orgrow">
    <label>Organization name</label>
    <input id="org" type="text" placeholder="Acme Inc" />
  </div>

  <div class="err" id="err"></div>
  <button id="submit" onclick="submit()">Sign in</button>
  <div class="toggle" id="toggle">
    New here? <a onclick="setMode('signup')">Create an account</a>
  </div>
</div>

<script>
let mode = "login";

function setMode(m) {
  mode = m;
  const signup = m === "signup";
  document.getElementById("title").textContent = signup ? "Create your workspace" : "Welcome back";
  document.getElementById("subtitle").textContent = signup
    ? "Set up your account and organization." : "Sign in to your Mini-P7 workspace.";
  document.getElementById("submit").textContent = signup ? "Create account" : "Sign in";
  document.getElementById("name-row").style.display = signup ? "block" : "none";
  document.getElementById("org-row").style.display = signup ? "block" : "none";
  document.getElementById("toggle").innerHTML = signup
    ? 'Already have an account? <a onclick="setMode(\'login\')">Sign in</a>'
    : 'New here? <a onclick="setMode(\'signup\')">Create an account</a>';
}

function showErr(msg) {
  const e = document.getElementById("err");
  e.textContent = msg; e.style.display = "block";
}

async function submit() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  if (!email || !password) return showErr("Email and password are required.");

  const path = mode === "signup" ? "/api/auth/signup" : "/api/auth/login";
  const body = mode === "signup"
    ? { email, password, name: document.getElementById("name").value.trim(),
        organization_name: document.getElementById("org").value.trim() || "My Organization" }
    : { email, password };

  try {
    const res = await fetch(path, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const d = (await res.json().catch(() => ({}))).detail;
      throw new Error(typeof d === "string" ? d : "Something went wrong.");
    }
    const data = await res.json();
    // store session and go to the app
    sessionStorage.setItem("minip7_token", data.access_token);
    sessionStorage.setItem("minip7_org", data.organization_id || "");
    sessionStorage.setItem("minip7_email", data.email || "");
    window.location.href = "/";
  } catch (e) {
    showErr(e.message);
  }
}

// Allow Enter to submit
document.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
</script>
</body>
</html>
