<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini-P7</title>
<style>
  :root {
    --bg:#f6f6f3; --panel:#fff; --ink:#1f1f1d; --muted:#6f6e68; --line:#e6e5df;
    --accent:#185fa5; --accent-soft:#e8f1fb; --crit:#c0392b; --crit-soft:#fbe9e9;
    --ok:#1d9e75; --shadow:0 1px 3px rgba(0,0,0,.05);
  }
  :root[data-theme="dark"] {
    --bg:#1b1b19; --panel:#242422; --ink:#e8e7e1; --muted:#9c9a92; --line:#35352f;
    --accent:#5b9bd9; --accent-soft:#1e2c3a; --crit:#e07065; --crit-soft:#3a2320;
    --ok:#3fcaa0; --shadow:0 1px 3px rgba(0,0,0,.3);
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:var(--bg); color:var(--ink); font-size:14px; }
  header { background:var(--panel); border-bottom:1px solid var(--line); padding:12px 22px;
           display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:10; }
  header h1 { font-size:17px; margin:0; font-weight:600; cursor:pointer; }
  .crumb { color:var(--muted); font-size:13px; }
  .spacer { margin-left:auto; }
  .email { color:var(--muted); font-size:13px; margin-right:6px; }
  button { font:inherit; font-size:13px; border:1px solid var(--line); background:var(--panel);
           color:var(--ink); padding:7px 13px; border-radius:8px; cursor:pointer; }
  button:hover { border-color:var(--accent); color:var(--accent); }
  button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  button.primary:hover { color:#fff; opacity:.92; }
  button.danger:hover { border-color:var(--crit); color:var(--crit); }
  main { padding:22px; max-width:1080px; margin:0 auto; }
  .kpis { display:flex; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
  .kpi { background:var(--panel); border:1px solid var(--line); border-radius:12px;
         padding:13px 18px; min-width:140px; box-shadow:var(--shadow); }
  .kpi .label { color:var(--muted); font-size:12px; }
  .kpi .value { font-size:23px; font-weight:600; margin-top:3px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px;
          margin-bottom:18px; overflow:hidden; box-shadow:var(--shadow); }
  .card-head { display:flex; align-items:center; padding:12px 18px; border-bottom:1px solid var(--line); }
  .card-head h2 { font-size:14px; margin:0; font-weight:600; }
  .card-head .spacer { margin-left:auto; }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:9px 14px; border-bottom:1px solid var(--line); font-size:13px; }
  th { color:var(--muted); font-weight:500; background:color-mix(in srgb, var(--panel) 70%, var(--bg)); }
  tr.crit td { background:var(--crit-soft); }
  tr.crit td:first-child { font-weight:600; color:var(--crit); }
  tr.clickable { cursor:pointer; }
  tr.clickable:hover td { background:var(--accent-soft); }
  .pill { display:inline-block; padding:1px 8px; border-radius:99px; font-size:11px; }
  .pill.crit { background:var(--crit); color:#fff; }
  .pill.float { background:var(--accent-soft); color:var(--accent); }
  .pill.type { background:var(--accent-soft); color:var(--accent); text-transform:capitalize; }
  .pill.milestone { background:var(--ok); color:#fff; }
  .rowact button { padding:3px 8px; font-size:12px; }
  .gantt { padding:14px 18px; overflow-x:auto; }
  .grow { display:flex; align-items:center; height:30px; }
  .grow .nm { width:150px; font-size:13px; flex-shrink:0; white-space:nowrap; overflow:hidden;
              text-overflow:ellipsis; }
  svg.bars { width:100%; display:block; }
  .empty { padding:46px; text-align:center; color:var(--muted); }
  .err { background:var(--crit-soft); color:var(--crit); padding:10px 14px; border-radius:8px;
         margin-bottom:14px; display:none; }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.35); display:none;
              align-items:center; justify-content:center; z-index:50; }
  .modal { background:var(--panel); border-radius:14px; padding:24px; width:420px; }
  .modal h3 { margin:0 0 14px; font-size:16px; }
  .modal label { display:block; font-size:12px; color:var(--muted); margin:11px 0 4px; }
  .modal input, .modal select { width:100%; padding:8px 11px; border:1px solid var(--line);
                 border-radius:8px; font:inherit; font-size:14px; background:var(--panel); color:var(--ink); }
  .modal input:focus, .modal select:focus { outline:none; border-color:var(--accent); }
  .modal .actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .grid3 { display:grid; grid-template-columns:1fr 1fr 70px; gap:10px; }
  .rel-list { margin:6px 0; }
  .rel-row { display:flex; align-items:center; justify-content:space-between;
    border:1px solid var(--line); border-radius:6px; padding:4px 8px; margin-bottom:4px; font-size:12px; }
  .rel-row button { padding:1px 6px; font-size:11px; }
  .evm-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:14px 10px; }
  .evm-grid .m-label { color:var(--muted); font-size:11px; text-transform:uppercase; }
  .evm-grid .m-value { font-size:16px; font-weight:600; margin-top:2px; }
  .evm-grid .m-value.warn { color:var(--crit); }
  .hint { color:var(--muted); font-size:12px; margin-top:4px; }
</style>
</head>
<body>
<header>
  <h1 onclick="showProjects()">Mini-P7</h1>
  <span class="crumb" id="crumb"></span>
  <span class="spacer"></span>
  <span class="email" id="email"></span>
  <button onclick="openSettings()">Settings</button>
  <button onclick="logout()">Sign out</button>
</header>
<main>
  <div class="err" id="err"></div>
  <div id="view"></div>
</main>

<!-- Task modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">Add task</h3>
    <div class="grid2">
      <div><label>ID</label><input id="m-id" placeholder="A" /></div>
      <div><label>Duration (days)</label><input id="m-dur" type="number" min="0" value="1" /></div>
    </div>
    <label>Name</label><input id="m-name" placeholder="Foundation" />
    <label>Type</label>
    <select id="m-type" onchange="onTypeChange()">
      <option value="task">Task</option>
      <option value="milestone">Milestone (zero duration)</option>
      <option value="level_of_effort">Level of effort</option>
      <option value="summary">Summary</option>
    </select>
    <label>Predecessors</label>
    <div class="rel-list" id="rel-list"></div>
    <div class="grid3">
      <select id="rel-pred"></select>
      <select id="rel-type">
        <option value="FS">FS — finish → start</option>
        <option value="SS">SS — start → start</option>
        <option value="FF">FF — finish → finish</option>
        <option value="SF">SF — start → finish</option>
      </select>
      <input id="rel-lag" type="number" placeholder="Lag" value="0" />
    </div>
    <button type="button" onclick="addRelationship()">+ Add predecessor</button>
    <div class="hint">Lag is in working days; negative lag is a lead (overlap).</div>
    <label>Resource (optional)</label><input id="m-res" placeholder="Electrical Team" />
    <label>Cost &amp; progress</label>
    <div class="grid3">
      <input id="m-budget" type="number" min="0" placeholder="Budget" value="0" />
      <input id="m-actual" type="number" min="0" placeholder="Actual cost" value="0" />
      <input id="m-pct" type="number" min="0" max="100" placeholder="% complete" value="0" />
    </div>
    <div class="actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="saveActivity()">Save task</button>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-bg" id="settings-bg">
  <div class="modal">
    <h3>Settings</h3>
    <label>Theme</label>
    <select id="s-theme">
      <option value="system">System</option>
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>
    <label>Duration units</label>
    <select id="s-units">
      <option value="days">Days</option>
      <option value="hours">Hours (8h/day)</option>
    </select>
    <label>Date format</label>
    <select id="s-date">
      <option value="iso">ISO — 2026-06-27</option>
      <option value="us">US — 06/27/2026</option>
      <option value="eu">EU — 27/06/2026</option>
    </select>
    <div class="hint">Date format applies once calendar dates land; saved now.</div>
    <label>Organization currency</label>
    <select id="s-currency"></select>
    <div class="hint">Changing currency is owner/admin only.</div>
    <div class="actions">
      <button onclick="closeSettings()">Cancel</button>
      <button class="primary" onclick="saveSettings()">Save settings</button>
    </div>
  </div>
</div>

<script>
const TOKEN = sessionStorage.getItem("minip7_token");
const ORG = sessionStorage.getItem("minip7_org");
const EMAIL = sessionStorage.getItem("minip7_email") || "";
if (!TOKEN || !ORG) location.href = "/login";
document.getElementById("email").textContent = EMAIL;

let currentProject = null, editingId = null;
let prefs = { units:"days", date_format:"iso", theme:"system" };
let currencies = [];
let currentActs = [];       // last-rendered activities, for the predecessor picker
let modalRelationships = []; // relationships being built in the open modal
let orgCurrency = { code:"USD", symbol:"$" };

async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type":"application/json", "Authorization":"Bearer "+TOKEN } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (res.status === 401) { sessionStorage.clear(); location.href="/login"; throw new Error("Session expired"); }
  if (!res.ok) { const d=(await res.json().catch(()=>({}))).detail; throw new Error(typeof d==="string"?d:"Request failed"); }
  return res.status === 204 ? null : res.json();
}
function showErr(m){ const e=document.getElementById("err"); e.textContent=m; e.style.display="block"; setTimeout(()=>e.style.display="none",4500); }
function logout(){ sessionStorage.clear(); location.href="/login"; }
const base = () => `/api/organizations/${ORG}/projects`;
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

// ---- preferences: theme + duration formatting ----
const mql = window.matchMedia("(prefers-color-scheme: dark)");
function applyTheme(theme){
  const dark = theme === "dark" || (theme === "system" && mql.matches);
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
}
mql.addEventListener("change", () => { if (prefs.theme === "system") applyTheme("system"); });
function fmtDur(days){
  if (prefs.units === "hours") { const h = days*8; return h + (h===1?" hr":" hrs"); }
  return days + (days===1?" day":" days");
}
function fmtMoney(n){
  return orgCurrency.symbol + Number(n).toLocaleString(undefined,{maximumFractionDigits:0});
}
async function loadOrgCurrency(){
  try { const orgs = await api("GET","/api/organizations");
    const o = orgs.find(o=>o.id===ORG); if (o && o.currency) orgCurrency = o.currency; } catch(e){}
}
async function loadPrefs(){
  try { prefs = await api("GET","/api/me/preferences"); } catch(e){ /* keep defaults */ }
  applyTheme(prefs.theme);
}

// ---- settings modal ----
async function openSettings(){
  document.getElementById("s-theme").value = prefs.theme;
  document.getElementById("s-units").value = prefs.units;
  document.getElementById("s-date").value = prefs.date_format;
  // currency picker
  try {
    if (!currencies.length) currencies = await api("GET","/api/currencies");
    let curCode = "USD";
    try { const orgs = await api("GET","/api/organizations");
      const o = orgs.find(o=>o.id===ORG); if (o && o.currency) curCode = o.currency.code; } catch(e){}
    const sel = document.getElementById("s-currency");
    sel.innerHTML = currencies.map(c=>`<option value="${c.code}">${c.code} — ${escapeHtml(c.name)} (${escapeHtml(c.symbol)})</option>`).join("");
    sel.value = curCode;
  } catch(e){}
  document.getElementById("settings-bg").style.display = "flex";
}
function closeSettings(){ document.getElementById("settings-bg").style.display = "none"; }
async function saveSettings(){
  const next = {
    theme: document.getElementById("s-theme").value,
    units: document.getElementById("s-units").value,
    date_format: document.getElementById("s-date").value,
  };
  try {
    prefs = await api("PUT","/api/me/preferences", next);
    applyTheme(prefs.theme);
    // currency (best-effort; API enforces owner/admin)
    const code = document.getElementById("s-currency").value;
    const cur = currencies.find(c=>c.code===code);
    if (cur) { try { await api("PUT",`/api/organizations/${ORG}/currency`, cur); }
               catch(e){ showErr("Preferences saved. Currency: "+e.message); closeSettings();
                         if (currentProject) reschedule(); else showProjects(); return; } }
    closeSettings();
    if (currentProject) reschedule(); else showProjects();
  } catch(e){ showErr(e.message); }
}

async function showProjects() {
  currentProject = null;
  document.getElementById("crumb").textContent = "Projects";
  document.getElementById("view").innerHTML = `<div class="card"><div class="card-head"><h2>Your projects</h2>
    <span class="spacer"></span><button class="primary" onclick="newProject()">+ New project</button></div>
    <div id="proj-list"><div class="empty">Loading…</div></div></div>`;
  try {
    const projects = await api("GET", base());
    const el = document.getElementById("proj-list");
    if (!projects.length) { el.innerHTML = `<div class="empty">No projects yet. Create one to get started.</div>`; return; }
    let html = `<table><thead><tr><th>Name</th><th>Tasks</th><th></th></tr></thead><tbody>`;
    for (const p of projects) html += `<tr class="clickable" onclick="openProject('${p.id}')">
      <td>${escapeHtml(p.name)}</td><td>${p.activities.length}</td>
      <td style="text-align:right" class="rowact"><button onclick="event.stopPropagation();openProject('${p.id}')">Open</button></td></tr>`;
    el.innerHTML = html + "</tbody></table>";
  } catch(e){ showErr(e.message); }
}
async function newProject() {
  const name = prompt("Project name:", "New Project"); if (!name) return;
  const id = "p_" + Math.random().toString(36).slice(2,9);
  try { await api("POST", `${base()}?id=${id}&name=${encodeURIComponent(name)}`); openProject(id); }
  catch(e){ showErr(e.message); }
}
async function openProject(pid){ currentProject=pid; try{ renderProject(await scheduleOrGet(pid)); }catch(e){ showErr(e.message);} }
async function scheduleOrGet(pid){
  try { return await api("POST", `${base()}/${pid}/schedule`); }
  catch(e){ const proj=await api("GET", `${base()}/${pid}`);
    return {project_id:pid, duration:0, critical_path:[], activities:proj.activities}; }
}
async function renderProject(data){
  const proj = await api("GET", `${base()}/${currentProject}`);
  document.getElementById("crumb").textContent = "Projects › " + proj.name;
  const acts = data.activities || proj.activities;
  currentActs = acts;
  const scheduled = (data.duration||0) > 0;
  document.getElementById("view").innerHTML = `
    <div class="kpis">
      <div class="kpi"><div class="label">Duration</div><div class="value">${scheduled?fmtDur(data.duration):"—"}</div></div>
      <div class="kpi"><div class="label">Tasks</div><div class="value">${acts.length}</div></div>
      <div class="kpi"><div class="label">Critical path</div><div class="value" style="font-size:15px">${(data.critical_path||[]).join(" → ")||"—"}</div></div>
    </div>
    <div class="card"><div class="card-head"><h2>Tasks</h2><span class="spacer"></span>
      <button onclick="loadSample()">Load sample</button>
      <button class="primary" onclick="openModal()">+ Add task</button>
      <button class="primary" onclick="reschedule()">▶ Schedule</button></div>
      <div id="task-table" style="overflow-x:auto"></div></div>
    <div class="card"><div class="card-head"><h2>Gantt</h2></div>
      <div class="gantt" id="gantt"></div></div>
    <div class="card"><div class="card-head"><h2>Earned value</h2><span class="spacer"></span>
      ${scheduled ? `
        <label style="margin:0 8px 0 0;font-size:12px;color:var(--muted)">As of day</label>
        <input id="evm-day" type="number" min="0" value="${Math.max(1,Math.floor((data.duration||1)/2))}"
          style="width:70px;padding:5px 8px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink)" />
        <button class="primary" onclick="loadEvm()">Compute</button>` : ""}
      </div>
      <div id="evm-body" style="padding:14px 18px">
        ${scheduled ? `<div class="empty">Pick a status day and click Compute.</div>`
                    : `<div class="empty">Schedule the project first.</div>`}
      </div></div>`;
  renderTable(acts, scheduled);
  renderGantt(acts, data.duration||0);
}
function typeCell(a){
  if (a.type === "milestone") return `<span class="pill milestone">milestone</span>`;
  if (a.type && a.type !== "task") return `<span class="pill type">${a.type.replace(/_/g," ")}</span>`;
  return `<span class="pill type">task</span>`;
}
function predCell(a){
  const rels = a.relationships || [];
  if (!rels.length) return "—";
  return rels.map(r=>{
    let s = r.predecessor_id;
    if (r.type && r.type !== "FS") s += "·" + r.type;
    if (r.lag) s += (r.lag>0?"+":"") + r.lag + "d";
    return s;
  }).join(", ");
}
function renderTable(acts, scheduled){
  const el=document.getElementById("task-table");
  if(!acts.length){ el.innerHTML=`<div class="empty">No tasks yet. Add one, or load the sample.</div>`; return; }
  let html=`<table><thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Dur</th><th>Pred</th><th>Res</th>
    <th>Budget</th><th>Actual</th><th>ES</th><th>EF</th><th>Float</th><th></th><th></th></tr></thead><tbody>`;
  for(const a of acts){
    const pill=scheduled?(a.is_critical?'<span class="pill crit">critical</span>':`<span class="pill float">${a.total_float}d float</span>`):"";
    html+=`<tr class="${a.is_critical&&scheduled?"crit":""}">
      <td>${a.id}</td><td>${escapeHtml(a.name)}</td><td>${typeCell(a)}</td><td>${fmtDur(a.duration)}</td>
      <td>${predCell(a)}</td><td>${escapeHtml(a.resource||"—")}</td>
      <td>${a.budget?fmtMoney(a.budget):"—"}</td><td>${a.actual_cost?fmtMoney(a.actual_cost):"—"}</td>
      <td>${scheduled?a.ES:"—"}</td><td>${scheduled?a.EF:"—"}</td><td>${scheduled?pill:"—"}</td>
      <td class="rowact"><button onclick='editActivity(${JSON.stringify(JSON.stringify(a))})'>Edit</button></td>
      <td class="rowact"><button class="danger" onclick="deleteActivity('${a.id}')">Delete</button></td></tr>`;
  }
  el.innerHTML=html+"</tbody></table>";
}
function renderGantt(acts, total){
  const el=document.getElementById("gantt");
  if(!acts.length||!total){ el.innerHTML=`<div class="empty">Schedule the project to see the Gantt.</div>`; return; }
  const rowH=30, barH=16, padY=7, W=760, scale=W/total;
  const pos={}; acts.forEach((a,i)=>pos[a.id]=i);
  let rows="", arrows="";
  acts.forEach((a,i)=>{
    const y=i*rowH+padY;
    const crit=a.is_critical, color=crit?"#c0392b":"#185fa5";
    if (a.type === "milestone" || a.duration === 0) {
      const cx=a.ES*scale, cy=y+barH/2, r=7;
      rows+=`<path d="M${cx},${cy-r} L${cx+r},${cy} L${cx},${cy+r} L${cx-r},${cy} Z" fill="${color}"></path>`;
    } else {
      const x=a.ES*scale, w=Math.max(a.duration*scale,3);
      rows+=`<rect x="${x}" y="${y}" width="${w}" height="${barH}" rx="3" fill="${color}"></rect>
             <text x="${x+4}" y="${y+barH-4}" font-size="11" fill="#fff">${a.id}</text>`;
    }
    (a.relationships||[]).forEach(r=>{
      const pid=r.predecessor_id;
      if(pos[pid]===undefined) return;
      const pa=acts[pos[pid]];
      // Endpoint depends on relationship type (ADR-0011): FS/SS anchor on the
      // start of the successor's side, FF/SF on the finish side; the "from"
      // point mirrors whichever side of the predecessor the type reads from.
      let fx, tx;
      if (r.type === "SS")      { fx=pa.ES*scale; tx=a.ES*scale; }
      else if (r.type === "FF") { fx=pa.EF*scale; tx=a.EF*scale; }
      else if (r.type === "SF") { fx=pa.ES*scale; tx=a.EF*scale; }
      else                      { fx=pa.EF*scale; tx=a.ES*scale; } // FS, default
      const fy=pos[pid]*rowH+padY+barH/2, ty=y+barH/2;
      const lineColor = r.type === "SF" ? "#c0392b" : "#9a9a93";
      arrows+=`<path d="M${fx},${fy} C${fx+14},${fy} ${tx-14},${ty} ${tx},${ty}" fill="none" stroke="${lineColor}" stroke-width="1.3"></path>
               <path d="M${tx},${ty} l-5,-3 l0,6 z" fill="${lineColor}"></path>`;
    });
  });
  const H=acts.length*rowH+padY;
  const labels=acts.map(a=>`<div class="grow"><div class="nm">${a.id} · ${escapeHtml(a.name)}</div></div>`).join("");
  el.innerHTML=`<div style="display:flex"><div style="flex-shrink:0">${labels}</div>
    <div style="flex:1"><svg class="bars" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:${H}px">${arrows}${rows}</svg></div></div>
    <div style="margin-top:8px;font-size:12px;color:var(--muted)"><span style="color:#c0392b">■</span> critical &nbsp;
    <span style="color:#185fa5">■</span> has float &nbsp; ◆ milestone &nbsp;
    <span style="color:#9a9a93">→</span> FS/SS/FF &nbsp; <span style="color:#c0392b">→</span> SF (uncommon, verify)</div>`;
}
async function reschedule(){ try{ renderProject(await api("POST", `${base()}/${currentProject}/schedule`)); }catch(e){ showErr(e.message);} }
async function loadSample(){ try{ await api("POST", `${base()}/${currentProject}/sample`); reschedule(); }catch(e){ showErr(e.message);} }

// ---- earned value (ADR-0013) ----
async function loadEvm(){
  const day = parseInt(document.getElementById("evm-day").value,10)||0;
  const body = document.getElementById("evm-body");
  body.innerHTML = `<div class="empty">Computing…</div>`;
  try {
    const r = await api("GET", `${base()}/${currentProject}/evm?as_of_day=${day}`);
    body.innerHTML = renderEvmGrid(r);
  } catch(e){ body.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`; }
}
function renderEvmGrid(r){
  const ratio = v => (v===null||v===undefined) ? "—" : v.toFixed(2);
  const money = v => (v===null||v===undefined) ? "—" : fmtMoney(v);
  const cell = (label,val,warn) => `<div><div class="m-label">${label}</div>
    <div class="m-value${warn?" warn":""}">${val}</div></div>`;
  return `<div class="evm-grid">
    ${cell("BAC", money(r.bac))}
    ${cell("PV", money(r.pv))}
    ${cell("EV", money(r.ev))}
    ${cell("AC", money(r.ac))}
    ${cell("SV", money(r.sv), r.sv<0)}
    ${cell("CV", money(r.cv), r.cv<0)}
    ${cell("SPI", ratio(r.spi), r.spi!==null && r.spi<1)}
    ${cell("CPI", ratio(r.cpi), r.cpi!==null && r.cpi<1)}
    ${cell("EAC", money(r.eac))}
    ${cell("VAC", money(r.vac), r.vac!==null && r.vac<0)}
  </div>`;
}

// ---- typed relationships (ADR-0011) ----
function populateRelPredOptions(excludeId){
  const sel = document.getElementById("rel-pred");
  const opts = currentActs.filter(a=>a.id!==excludeId)
    .map(a=>`<option value="${a.id}">${a.id} — ${escapeHtml(a.name)}</option>`).join("");
  sel.innerHTML = `<option value="">Predecessor…</option>` + opts;
}
function addRelationship(){
  const pred = document.getElementById("rel-pred").value;
  if (!pred) return;
  const type = document.getElementById("rel-type").value;
  const lag = parseInt(document.getElementById("rel-lag").value,10) || 0;
  modalRelationships.push({ predecessor_id: pred, type, lag });
  document.getElementById("rel-lag").value = "0";
  renderRelList();
}
function removeRelationship(i){ modalRelationships.splice(i,1); renderRelList(); }
function renderRelList(){
  const el = document.getElementById("rel-list");
  if (!modalRelationships.length){ el.innerHTML = `<div class="hint">No predecessors yet.</div>`; return; }
  el.innerHTML = modalRelationships.map((r,i)=>{
    const lagTxt = r.lag ? ` ${r.lag>0?"+":""}${r.lag}d` : "";
    return `<div class="rel-row"><span>${r.predecessor_id} · ${r.type}${lagTxt}</span>
      <button onclick="removeRelationship(${i})">Remove</button></div>`;
  }).join("");
}

function onTypeChange(){
  const t=document.getElementById("m-type").value, dur=document.getElementById("m-dur");
  if (t === "milestone") { dur.value="0"; dur.disabled=true; } else { dur.disabled=false; }
}
function openModal(){ editingId=null; modalRelationships=[]; document.getElementById("modal-title").textContent="Add task";
  ["m-id","m-name","m-res"].forEach(i=>document.getElementById(i).value="");
  document.getElementById("m-dur").value="1"; document.getElementById("m-id").disabled=false;
  document.getElementById("m-type").value="task"; onTypeChange();
  document.getElementById("m-budget").value="0"; document.getElementById("m-actual").value="0";
  document.getElementById("m-pct").value="0";
  populateRelPredOptions(null); renderRelList();
  document.getElementById("modal-bg").style.display="flex"; }
function editActivity(json){ const a=JSON.parse(json); editingId=a.id;
  document.getElementById("modal-title").textContent="Edit task";
  document.getElementById("m-id").value=a.id; document.getElementById("m-id").disabled=true;
  document.getElementById("m-name").value=a.name; document.getElementById("m-dur").value=a.duration;
  document.getElementById("m-type").value=a.type||"task";
  document.getElementById("m-res").value=a.resource||"";
  document.getElementById("m-budget").value=a.budget||0;
  document.getElementById("m-actual").value=a.actual_cost||0;
  document.getElementById("m-pct").value=a.percent_complete||0;
  modalRelationships = (a.relationships||[]).map(r=>({predecessor_id:r.predecessor_id, type:r.type||"FS", lag:r.lag||0}));
  populateRelPredOptions(a.id); renderRelList();
  onTypeChange();
  document.getElementById("modal-bg").style.display="flex"; }
function closeModal(){ document.getElementById("modal-bg").style.display="none"; }
async function saveActivity(){
  const id=document.getElementById("m-id").value.trim(), name=document.getElementById("m-name").value.trim();
  const type=document.getElementById("m-type").value;
  let dur=parseInt(document.getElementById("m-dur").value,10);
  if (type==="milestone") dur=0;
  const res=document.getElementById("m-res").value.trim()||null;
  const budget=parseFloat(document.getElementById("m-budget").value)||0;
  const actual_cost=parseFloat(document.getElementById("m-actual").value)||0;
  const percent_complete=parseInt(document.getElementById("m-pct").value,10)||0;
  if(!id||!name) return showErr("ID and name are required.");
  // `relationships` is canonical (ADR-0011); the API rebuilds `predecessors`
  // from it, so there's nothing else to send for dependencies.
  const activity={id,name,duration:isNaN(dur)?0:dur,type,resource:res,
    relationships:modalRelationships, budget, actual_cost, percent_complete};
  try{
    if(editingId) await api("PUT", `${base()}/${currentProject}/activities/${editingId}`, activity);
    else await api("POST", `${base()}/${currentProject}/activities`, activity);
    closeModal(); reschedule();
  }catch(e){ showErr(e.message); }
}
async function deleteActivity(aid){ if(!confirm(`Delete task ${aid}?`)) return;
  try{ await api("DELETE", `${base()}/${currentProject}/activities/${aid}`); reschedule(); }catch(e){ showErr(e.message); } }

(async function init(){ await loadPrefs(); await loadOrgCurrency(); showProjects(); })();
</script>
