<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini-P7</title>
<style>
  :root {
    --bg: #f7f7f4; --panel: #ffffff; --ink: #1f1f1d; --muted: #6b6a64;
    --line: #e4e3dd; --accent: #185fa5; --accent-soft: #e6f1fb;
    --crit: #c0392b; --crit-soft: #fcebeb; --ok: #1d9e75;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--ink); }
  header { background: var(--panel); border-bottom: 1px solid var(--line);
           padding: 14px 22px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 600; margin: 0; }
  header .sub { color: var(--muted); font-size: 13px; }
  .bar { margin-left: auto; display: flex; gap: 8px; }
  button { font: inherit; font-size: 13px; border: 1px solid var(--line);
           background: var(--panel); color: var(--ink); padding: 7px 13px;
           border-radius: 8px; cursor: pointer; }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { color: #fff; opacity: .92; }
  main { padding: 22px; max-width: 1100px; margin: 0 auto; }
  .kpis { display: flex; gap: 14px; margin-bottom: 18px; }
  .kpi { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
         padding: 14px 18px; min-width: 150px; }
  .kpi .label { color: var(--muted); font-size: 12px; }
  .kpi .value { font-size: 24px; font-weight: 600; margin-top: 4px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
          padding: 0; margin-bottom: 18px; overflow: hidden; }
  .card h2 { font-size: 14px; margin: 0; padding: 13px 18px; border-bottom: 1px solid var(--line);
             font-weight: 600; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 9px 14px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 500; background: #fafaf8; }
  tr.crit td { background: var(--crit-soft); }
  tr.crit td:first-child { font-weight: 600; color: var(--crit); }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 99px; font-size: 11px; }
  .pill.crit { background: var(--crit); color: #fff; }
  .pill.float { background: var(--accent-soft); color: var(--accent); }
  .gantt { padding: 14px 18px; overflow-x: auto; }
  .row { display: flex; align-items: center; height: 30px; }
  .row .name { width: 130px; font-size: 13px; flex-shrink: 0; }
  .track { position: relative; flex: 1; height: 18px; }
  .baar { position: absolute; height: 18px; border-radius: 4px; }
  .baar.crit { background: var(--crit); }
  .baar.norm { background: var(--accent); }
  .empty { padding: 40px; text-align: center; color: var(--muted); }
  .err { background: var(--crit-soft); color: var(--crit); padding: 10px 14px;
         border-radius: 8px; margin-bottom: 14px; display: none; }
</style>
</head>
<body>
<header>
  <h1>Mini-P7</h1>
  <span class="sub" id="proj-name">— no project —</span>
  <div class="bar">
    <button onclick="loadSample()">Load sample</button>
    <button class="primary" onclick="runSchedule()">▶ Schedule</button>
  </div>
</header>

<main>
  <div class="err" id="err"></div>

  <div class="kpis">
    <div class="kpi"><div class="label">Project duration</div><div class="value" id="kpi-dur">—</div></div>
    <div class="kpi"><div class="label">Activities</div><div class="value" id="kpi-count">—</div></div>
    <div class="kpi"><div class="label">Critical path</div><div class="value" id="kpi-crit" style="font-size:15px">—</div></div>
  </div>

  <div class="card">
    <h2>Schedule</h2>
    <div id="table-wrap"><div class="empty">Load the sample, then press Schedule.</div></div>
  </div>

  <div class="card">
    <h2>Gantt</h2>
    <div class="gantt" id="gantt"><div class="empty">No schedule yet.</div></div>
  </div>
</main>

<script>
const PROJECT = "demo";
let lastData = null;

async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) {
    const detail = (await res.json().catch(() => ({}))).detail || res.statusText;
    throw new Error(detail);
  }
  return res.json();
}
function showErr(msg) {
  const e = document.getElementById("err");
  e.textContent = msg; e.style.display = "block";
  setTimeout(() => (e.style.display = "none"), 4000);
}
async function ensureProject() {
  try { await api("GET", `/api/projects/${PROJECT}`); }
  catch { await api("POST", `/api/projects?id=${PROJECT}&name=Harbor+View+Office+Complex`); }
}
async function loadSample() {
  try {
    await ensureProject();
    await api("POST", `/api/projects/${PROJECT}/sample`);
    await runSchedule();
  } catch (e) { showErr(e.message); }
}
async function runSchedule() {
  try {
    await ensureProject();
    const data = await api("POST", `/api/projects/${PROJECT}/schedule`);
    lastData = data;
    render(data);
  } catch (e) { showErr(e.message); }
}
function render(data) {
  document.getElementById("proj-name").textContent = "Harbor View Office Complex";
  document.getElementById("kpi-dur").textContent = data.duration + " days";
  document.getElementById("kpi-count").textContent = data.activities.length;
  document.getElementById("kpi-crit").textContent = data.critical_path.join(" → ");

  const acts = data.activities;
  let html = "<table><thead><tr><th>ID</th><th>Name</th><th>Dur</th><th>Pred</th>" +
    "<th>ES</th><th>EF</th><th>LS</th><th>LF</th><th>Float</th><th></th></tr></thead><tbody>";
  for (const a of acts) {
    const pill = a.is_critical
      ? '<span class="pill crit">critical</span>'
      : `<span class="pill float">${a.total_float}d float</span>`;
    html += `<tr class="${a.is_critical ? "crit" : ""}">
      <td>${a.id}</td><td>${a.name}</td><td>${a.duration}</td>
      <td>${a.predecessors.join(",") || "—"}</td>
      <td>${a.ES}</td><td>${a.EF}</td><td>${a.LS}</td><td>${a.LF}</td>
      <td>${a.total_float}</td><td>${pill}</td></tr>`;
  }
  html += "</tbody></table>";
  document.getElementById("table-wrap").innerHTML = html;

  const total = data.duration || 1;
  let g = "";
  for (const a of acts) {
    const left = (a.ES / total) * 100;
    const width = Math.max((a.duration / total) * 100, 1.5);
    g += `<div class="row"><div class="name">${a.id} · ${a.name}</div>
      <div class="track"><div class="baar ${a.is_critical ? "crit" : "norm"}"
        style="left:${left}%;width:${width}%"></div></div></div>`;
  }
  document.getElementById("gantt").innerHTML = g;
}
loadSample();
</script>
</body>
</html>
