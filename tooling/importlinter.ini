# Enforces the dependency rule for Python packages (ADR-0002).
# Run with: lint-imports --config tooling/importlinter.ini
[importlinter]
root_packages =
    schema
    engine
    persistence
    services

[importlinter:contract:layers]
name = Commons may only depend inward
type = layers
layers =
    services
    persistence
    engine
    schema
    sunscrena
