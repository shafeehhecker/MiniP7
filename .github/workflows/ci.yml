# CI — makes the repository's promises true (Phase 0).
#
# Four gates, mirroring the roadmap's "done when" criteria:
#   1. tests        — every package's suite passes (3.11 and 3.12)
#   2. architecture — the inward dependency rule holds (ADR-0002)
#   3. codegen      — the TypeScript types match the Pydantic schema (ADR-0003)
#   4. docs         — the documentation site builds strictly; deployed on main
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest -q

  architecture:
    name: Dependency rule (ADR-0002)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: lint-imports --config tooling/importlinter.ini

  codegen:
    name: Schema → TypeScript drift (ADR-0003)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12", cache: pip }
      - uses: actions/setup-node@v5
        with: { node-version: "24" }
      - run: pip install -r requirements.txt
      # Gate 1: the committed TypeScript is exactly what the schema generates.
      - run: python tooling/codegen/generate_ts.py --check
      # Gate 2: the generated TypeScript compiles under strict mode.
      - run: npx --yes --package typescript@5 tsc --noEmit --strict packages/client/src/models.ts

  docs:
    name: Docs build (strict) + deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write  # mkdocs gh-deploy pushes to the gh-pages branch
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r requirements-dev.txt
      - run: mkdocs build --strict
      - name: Deploy to GitHub Pages (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force
